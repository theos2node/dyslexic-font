<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dyslexic Focus Text Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Dyslexic Reading Tool</p>
          <h1>Dyslexic Focus Text Lab</h1>
          <p class="subtitle">
            Built from my own dyslexia reading needs: a full-screen writing tool with live
            highlighting in the font/style pattern that helps me read.
          </p>
        </div>

        <div class="controls">
          <label class="control" for="modeSelect">
            <span>Mode</span>
            <select id="modeSelect">
              <option value="syllable" selected>Syllable Change</option>
              <option value="adaptive">Adaptive</option>
              <option value="classic">Classic</option>
            </select>
          </label>

          <label class="checkbox control">
            <input id="lockToTitleCase" type="checkbox" />
            <span>Auto title case</span>
          </label>

          <button id="copyBtn" type="button">Copy plain text</button>
          <button id="printBtn" type="button">Print formatted</button>
        </div>
      </header>

      <main class="workspace">
        <section class="panel editor-panel">
          <div class="panel-head">
            <h2>Input</h2>
            <p id="editorStats" class="stats"></p>
          </div>
          <textarea
            id="inputText"
            spellcheck="false"
            placeholder="Paste or write as much as you want..."
          >What a pleasant surprise to read</textarea>
        </section>

        <section class="panel preview-panel">
          <div class="panel-head">
            <h2>Preview</h2>
            <p class="stats">Live</p>
          </div>
          <div class="preview-surface" aria-live="polite">
            <div class="preview-text" id="nameplateOutput"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
